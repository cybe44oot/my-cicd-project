name: CI/CD Pipeline


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ─────────────────────────────────────
  # JOB 1 — SonarQube Analysis
  # ─────────────────────────────────────
  sonarqube:
    name: 🔍 SonarQube Analysis
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0        # full history needed for sonar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─────────────────────────────────────
  # JOB 2 — Trivy Security Scan
  # ─────────────────────────────────────
  trivy:
    name: 🛡️ Trivy Scan
    runs-on: ubuntu-latest
    needs: sonarqube          # runs after sonarqube passes
    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image for scanning
        run: docker build -t my-cicd-project-frontend:latest -f frontend/Dockerfile ./frontend

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: my-cicd-project:latest
          format: table
          exit-code: 0         # 0 = don't fail pipeline on findings (change to 1 to fail)
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────
  # JOB 3 — Build and Push to Docker Hub
  # ─────────────────────────────────────
  docker:
    name: 🐳 Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: trivy              # runs after trivy passes
    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-cicd-project:latest
