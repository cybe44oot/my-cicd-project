name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ─────────────────────────────────────
  # JOB 1 — SonarQube Analysis
  # ─────────────────────────────────────
  sonarqube:
    name: 🔍 SonarQube Analysis
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # full history needed for sonar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─────────────────────────────────────
  # JOB 2 — Trivy Security Scan
  # ─────────────────────────────────────
  trivy:
    name: 🛡️ Trivy Scan
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      # Build frontend image
      - name: Build Frontend Docker image for scanning
        run: docker build -t my-cicd-project-frontend:latest -f frontend/Dockerfile ./frontend

      # Build backend image
      - name: Build Backend Docker image for scanning
        run: docker build -t my-cicd-project-backend:latest -f backend/Dockerfile ./backend

      # Run Trivy scan on frontend
      - name: Run Trivy Scan on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: my-cicd-project-frontend:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      # Run Trivy scan on backend
      - name: Run Trivy Scan on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: my-cicd-project-backend:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────
  # JOB 3 — Build & Push to Docker Hub
  # ─────────────────────────────────────
  docker:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: trivy
    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & push frontend image
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-cicd-project-frontend:latest

      # Build & push backend image
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-cicd-project-backend:latest
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/my-cicd-project
            docker-compose pull
            docker-compose up -d --build
