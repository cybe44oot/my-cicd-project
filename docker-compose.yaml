version: '3.8'

services:

  backend:
    build: ./backend
    container_name: my-backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: my-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    
